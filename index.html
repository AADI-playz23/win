<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absora Studio | Cloud mission control</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0c; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 24px; width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--neon); font-size: 1.8rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .status-pill { background: rgba(0, 255, 204, 0.1); color: var(--neon); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; display: inline-block; margin-bottom: 20px; }
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; font-size: 0.8rem; color: #888; }
        .feature { border: 1px solid #333; padding: 10px; border-radius: 8px; }
        button { background: var(--neon); color: #000; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 255, 204, 0.3); }
        #log { margin-top: 15px; font-family: monospace; font-size: 0.7rem; color: #666; height: 40px; }
    </style>
</head>
<body>
    <div class="glass">
        <h1>Absora Studio</h1>
        <div class="status-pill" id="state">SYSTEM READY</div>
        
        <div class="feature-grid">
            <div class="feature">⌨️ WebSocket Keybd</div>
            <div class="feature">🖱️ Low-Latency Mouse</div>
            <div class="feature">📁 Win-Disk Sync</div>
            <div class="feature">🔒 256-bit Tunnel</div>
        </div>

        <button onclick="bootSequence()">INITIALIZE SESSION</button>
        <div id="log">Waiting for user input...</div>
        
        <p style="font-size: 0.7rem; color: #444; margin-top: 20px;">Use Chrome/Edge for best performance.</p>
    </div>

    <script>
        async function bootSequence() {
            const log = document.getElementById('log');
            const state = document.getElementById('state');
            const TOKEN = prompt("Enter Absora Access Token (GitHub PAT):");
            if(!TOKEN) return;

            log.innerText = "Dispatching signal to AADI-playz23/win...";
            state.innerText = "BOOTING...";

            try {
                const res = await fetch(`https://api.github.com/repos/AADI-playz23/win/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({ event_type: 'launch_studio' })
                });

                if(res.status === 204) {
                    log.innerText = "Handshake Successful. VM starting.";
                    state.innerText = "VM ONLINE";
                    alert("VM Triggered! Wait 2 mins then open your Cloudflare URL.");
                } else {
                    log.innerText = "Handshake Failed. Check Token.";
                }
            } catch (e) {
                log.innerText = "Network Error.";
            }
        }
    </script>
</body>
</html>
