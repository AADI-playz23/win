<!DOCTYPE html>
<html lang="en">
<head>
    <title>Absora Studio | noVNC Mission Control</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0c; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .sidebar { width: 300px; height: 100vh; background: rgba(255,255,255,0.02); border-right: 1px solid #222; padding: 20px; position: fixed; left: 0; z-index: 10; }
        .viewport { margin-left: 300px; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        h1 { color: var(--neon); font-size: 1.2rem; text-transform: uppercase; }
        .btn { background: var(--neon); color: #000; border: none; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .status { font-size: 0.8rem; margin-top: 10px; color: #666; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Absora Studio</h1>
        <p class="status" id="state">Ready to deploy Windows 10 Env...</p>
        <button class="btn" id="bootBtn" onclick="launchVM()">BOOT SYSTEM</button>
        <hr style="border: 0.5px solid #222; margin: 20px 0;">
        <div style="font-size: 0.7rem; color: #444;">
            FEATURES:<br>
            • WebSockets: Enabled<br>
            • Storage: win-disk<br>
            • Protocol: noVNC
        </div>
    </div>

    <div class="viewport" id="view">
        <div id="loader">Waiting for system boot...</div>
        <iframe id="vncFrame"></iframe>
    </div>

    <script>
        async function launchVM() {
            const TOKEN = prompt("Enter Absora PAT:");
            if(!TOKEN) return;
            
            document.getElementById('state').innerText = "Provisioning Runner...";
            
            const res = await fetch(`https://api.github.com/repos/AADI-playz23/win/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ event_type: 'launch_studio' })
            });

            if(res.ok) {
                let count = 90;
                const timer = setInterval(() => {
                    count--;
                    document.getElementById('state').innerText = `Booting Windows (${count}s)...`;
                    if(count <= 0) {
                        clearInterval(timer);
                        showDesktop();
                    }
                }, 1000);
            }
        }

        function showDesktop() {
            const frame = document.getElementById('vncFrame');
            const loader = document.getElementById('loader');
            // This URL should point to your Cloudflare tunnel hostname
            frame.src = "https://studio.yourdomain.com/vnc.html?autoconnect=true";
            frame.style.display = "block";
            loader.style.display = "none";
            document.getElementById('state').innerText = "SYSTEM ONLINE";
        }
    </script>
</body>
</html>
