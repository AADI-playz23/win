name: Absora Studio Core
on:
  repository_dispatch:
    types: [launch_studio]

jobs:
  studio-session:
    runs-on: windows-latest # This forces a Windows Virtual Environment
    steps:
      - name: Configure Windows Environment
        run: |
          # Create a secure password for login
          $Password = ConvertTo-SecureString "AbsoraStudio2026!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          
          # Force Windows to accept RDP and WebSockets
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
      - name: Link Absora Storage (win-disk)
        run: |
          git config --global user.email "studio@absora.cloud"
          git config --global user.name "AADI-playz23"
          git clone https://${{ secrets.WIN_DISK_TOKEN }}@github.com/AADI-playz23/win-disk.git C:\AbsoraStudio
          
      - name: Start Cloudflare Tunnel
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          # This connects your VM to the URL in your index.html
          Start-Process ./cloudflared.exe -ArgumentList "tunnel", "--no-autoupdate", "run", "--token", "${{ secrets.CLOUDFLARE_TOKEN }}"
          
      - name: Persistent Desktop Session
        run: |
          Write-Host "Absora Studio is LIVE. Windows Desktop is accessible via WebSocket."
          $sessionLimit = (Get-Date).AddHours(5).AddMinutes(50)
          
          # Background Loop to keep VM alive and sync files
          while ((Get-Date) -lt $sessionLimit) {
              if (Test-Path C:\AbsoraStudio) {
                  cd C:\AbsoraStudio
                  git add .
                  git commit -m "Auto-Sync: $(Get-Date -Format 'HH:mm')"
                  git push origin main
              }
              Start-Sleep -Seconds 300
          }
