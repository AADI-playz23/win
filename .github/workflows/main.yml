name: Absora Studio noVNC
on:
  repository_dispatch:
    types: [launch_studio]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install VNC & Websockify
        run: |
          # Install UltraVNC (Server)
          choco install ultravnc -y
          
          # Install Python and Websockify for the WebSocket bridge
          choco install python -y
          pip install websockify
          
      - name: Configure VNC Password
        run: |
          # Set VNC password to 'absora2026' (Hex format for UltraVNC)
          $vncPath = "C:\Program Files\uvnc bvba\UltraVNC"
          Start-Process "$vncPath\winvnc.exe" -ArgumentList "-install"
          # Note: In a real setup, you'd automate the ini settings here
          
      - name: Link Absora Storage (win-disk)
        run: |
          git clone https://${{ secrets.WIN_DISK_TOKEN }}@github.com/AADI-playz23/win-disk.git C:\AbsoraStudio
          
      - name: Start Services & Tunnel
        run: |
          # Start the VNC Server
          net start ovnc_service
          
          # Start Websockify bridge (Port 5900 VNC -> Port 8080 WebSocket)
          Start-Process python -ArgumentList "-m websockify 8080 localhost:5900"
          
          # Download and Start Cloudflare Tunnel
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          Start-Process ./cloudflared.exe -ArgumentList "tunnel", "--no-autoupdate", "run", "--token", "${{ secrets.CLOUDFLARE_TOKEN }}"
          
      - name: Persistence Loop
        run: |
          $timeout = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $timeout) {
              if (Test-Path C:\AbsoraStudio) {
                  cd C:\AbsoraStudio
                  git add .
                  git commit -m "noVNC Session Sync"
                  git push origin main
              }
              Start-Sleep -Seconds 300
          }
